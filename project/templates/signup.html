{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow border-0">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">Sign Up</h3>

                <form method="POST" action="{{ url_for('auth.signup_post') }}">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input class="form-control form-control-lg" id="email" type="email" name="email" placeholder="Email" required autofocus>
                    </div>

                    <div class="mb-3">
                        <label for="name" class="form-label">Name</label>
                        <input class="form-control form-control-lg" id="name" type="text" name="name" placeholder="Name" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input class="form-control form-control-lg" id="password" type="password" name="password" placeholder="Password" required>
                    </div>

                    <button class="btn btn-info btn-lg w-100">Sign Up</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
