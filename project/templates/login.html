{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow border-0">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">Login</h3>

                {% with messages = get_flashed_messages() %}
                {% if messages %}
                <div class="alert alert-danger">{{ messages[0] }}</div>
                {% endif %}
                {% endwith %}

                <form method="POST" action="{{ url_for('auth.login_post') }}">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input class="form-control form-control-lg" id="email" type="email" name="email" placeholder="Your Email" required autofocus>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input class="form-control form-control-lg" id="password" type="password" name="password" placeholder="Your Password" required>
                    </div>

                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="remember" name="remember">
                        <label class="form-check-label" for="remember">Remember me</label>
                    </div>

                    <button class="btn btn-info btn-lg w-100">Login</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
